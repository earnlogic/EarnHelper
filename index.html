<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Logic - Official</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ১. ডিজাইনের কালার এবং স্টাইল (CSS) --- */
        :root { --primary: #00d4ff; --bg: #050505; --card: #121212; --text: #ffffff; --gold: #ffd700; --tg: #0088cc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 70px; padding-bottom: 80px; }
        
        .navbar { background: #111; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .logo { font-weight: bold; color: var(--primary); font-size: 22px; text-decoration: none; }
        
        .auth-container { max-width: 400px; margin: 40px auto; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 13px; background: linear-gradient(45deg, #0072ff, #00d4ff); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #dashboard, #profile-page, #legal-page { display: none; padding: 20px; text-align: center; max-width: 800px; margin: 0 auto; }
        .bal-card { background: linear-gradient(135deg, #111, #222); padding: 30px; border-radius: 25px; border: 1px solid #333; margin-bottom: 20px; }
        
        /* নিচের মেনু বার স্টাইল */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: none; justify-content: space-around; align-items: center; padding: 10px 0; border-top: 1px solid #222; z-index: 9999; }
        .nav-item { text-align: center; flex: 1; cursor: pointer; color: #888; font-size: 10px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">EARN LOGIC</a>
        <select id="lang-switch" style="width: auto; background: #222; padding: 5px;">
            <option value="en">English</option>
            <option value="bn">বাংলা</option>
        </select>
    </nav>

    <div class="auth-container" id="auth-ui">
        <div class="card" id="signup-form">
            <h2>Sign Up</h2>
            <input type="text" id="s-user" placeholder="Username">
            <input type="email" id="s-email" placeholder="Email">
            <input type="password" id="s-pass" placeholder="Password">
            <button class="btn-main" onclick="register()">Register</button>
            <p onclick="toggleForm()" style="cursor:pointer; color:#555; margin-top:15px;">Already have an account? Login</p>
        </div>
        <div class="card" id="login-form" style="display:none">
            <h2>Login</h2>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn-main" onclick="login()">Sign In</button>
            <p onclick="toggleForm()" style="cursor:pointer; color:#555; margin-top:15px;">New here? Register</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="bal-card">
            <p>Main Balance</p>
            <h1 style="color:var(--primary); font-size:45px;"><i class="fas fa-coins"></i> <span id="coins">0</span></h1>
            <button onclick="showWithdraw()" class="btn-main" style="width:auto; padding:10px 30px;">Withdraw Now</button>
        </div>
        
        <div onclick="window.location.href='https://t.me/earnlogic_official_bot'" style="background: linear-gradient(135deg, #0088cc, #00d4ff); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor:pointer;">
            <div style="text-align:left;">
                <h3 style="margin:0;">Earning via Telegram</h3>
                <p style="margin:5px 0 0; font-size:12px;">Complete tasks in our bot!</p>
            </div>
            <i class="fab fa-telegram-plane" style="font-size:30px;"></i>
        </div>
    </div>

    <div id="legal-page">
        <div class="card">
            <h2 id="legal-title" style="color:var(--primary);"></h2>
            <p id="legal-content" style="text-align:left; line-height:1.6; color:#ccc;"></p>
            <button class="btn-main" onclick="showPage('dashboard')">Back to Home</button>
        </div>
    </div>

    <div id="profile-page">
        <div class="card">
            <h2>Your Profile</h2>
            <p id="p-username" style="color:var(--primary); font-weight:bold;"></p>
            <p id="p-email"></p>
            <hr style="border:0.5px solid #222;">
            <p>Referral Code:</p>
            <div style="background:#000; padding:10px; border:1px dashed var(--primary);" id="ref-code">...</div>
            <button class="btn-main" onclick="logout()" style="background:red; margin-top:20px;">Logout</button>
        </div>
    </div>

    <div class="bottom-nav" id="bot-nav">
        <div class="nav-item" onclick="showPage('dashboard')"><i class="fas fa-home"></i><div>Home</div></div>
        <div class="nav-item" onclick="showLegal('about')"><i class="fas fa-info-circle"></i><div>About</div></div>
        <div class="nav-item" onclick="showLegal('terms')"><i class="fas fa-file-contract"></i><div>Terms</div></div>
        <div class="nav-item" onclick="showLegal('halal')"><i class="fas fa-mosque"></i><div>Halal</div></div>
        <div class="nav-item" onclick="showPage('profile-page')"><i class="fas fa-user"></i><div>Profile</div></div>
    </div>

    <script>
        /* --- ৮. জাভাস্ক্রিপ্ট লজিক --- */
        
        // Firebase কনফিগ (তোমার দেওয়া তথ্য অনুযায়ী)
        const firebaseConfig = {
            apiKey: "AIzaSyAjOTYWJ8znUI-w10BYnDe2M9b4L4NkrqA",
            authDomain: "earn-logic.firebaseapp.com",
            projectId: "earn-logic",
            storageBucket: "earn-logic.firebasestorage.app",
            messagingSenderId: "254063437159",
            appId: "1:254063437159:web:a8e118c33c924bd48c3bc2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // পেজ পরিবর্তনের ফাংশন
        function showPage(id) {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('profile-page').style.display = 'none';
            document.getElementById('legal-page').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        // লিগ্যাল তথ্য দেখানোর ফাংশন (About, Terms, Halal)
        function showLegal(type) {
            const lang = document.getElementById('lang-switch').value;
            const data = {
                about: { title: "About Us", en: "Earn Logic is a secure micro-task platform for real rewards.", bn: "আর্ন লজিক একটি নিরাপদ মাইক্রো-টাস্ক প্ল্যাটফর্ম।" },
                terms: { title: "Terms & Policy", en: "1. One account per user. 2. No VPN. 3. No fake proof.", bn: "১. একজন একটি অ্যাকাউন্ট। ২. ভিপিএন নিষেধ। ৩. ভুয়া কাজ নিষেধ।" },
                halal: { title: "Halal Guidelines", en: "We strictly follow halal earning policies. No gambling or adult content.", bn: "আমরা কঠোরভাবে হালাল উপার্জন নীতি অনুসরণ করি। কোনো জুয়া বা নিষিদ্ধ কাজ এখানে নেই।" }
            };
            document.getElementById('legal-title').innerText = data[type].title;
            document.getElementById('legal-content').innerText = lang === 'bn' ? data[type].bn : data[type].en;
            showPage('legal-page');
        }

        function toggleForm() {
            document.getElementById("login-form").style.display = document.getElementById("login-form").style.display === "none" ? "block" : "none";
            document.getElementById("signup-form").style.display = document.getElementById("signup-form").style.display === "none" ? "block" : "none";
        }

        function showWithdraw() {
            alert("Please use @earnlogic_official_bot for withdrawal.");
            window.location.href = "https://t.me/earnlogic_official_bot";
        }

        // লগইন স্ট্যাটাস চেক
        auth.onAuthStateChanged(user => {
            const nav = document.getElementById('bot-nav');
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                showPage('dashboard');
                nav.style.display = 'flex';
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        const d = doc.data();
                        document.getElementById('coins').innerText = d.coins || 0;
                        document.getElementById('p-username').innerText = d.username || "User";
                        document.getElementById('p-email').innerText = d.email || "";
                        document.getElementById('ref-code').innerText = d.referCode || "...";
                    }
                });
            } else {
                document.getElementById('auth-ui').style.display = 'block';
                nav.style.display = 'none';
                showPage('dashboard'); // এটি হাইড থাকবে কারণ auth-ui সামনে
            }
        });

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
