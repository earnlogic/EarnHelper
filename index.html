<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Logic - Official</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #121212; --text: #ffffff; --gold: #ffd700; --tg: #0088cc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 70px; padding-bottom: 80px; }
        .navbar { background: #111; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .logo { font-weight: bold; color: var(--primary); font-size: 22px; text-decoration: none; }
        #menu-trigger { display: none; cursor: pointer; font-size: 24px; color: var(--primary); }
        .sidebar { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: #0d0d0d; transition: 0.4s; z-index: 1001; overflow-y: auto; border-right: 1px solid #222; }
        .sidebar.active { left: 0; }
        .menu-btn { width: 100%; text-align: left; padding: 15px 25px; background: none; border: none; color: white; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
        .auth-container { max-width: 400px; margin: 40px auto; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 13px; background: linear-gradient(45deg, #0072ff, #00d4ff); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #dashboard, #profile-page { display: none; padding: 20px; text-align: center; max-width: 800px; margin: 0 auto; animation: fadeIn 0.5s; }
        .bal-card { background: linear-gradient(135deg, #111, #222); padding: 30px; border-radius: 25px; border: 1px solid #333; margin-bottom: 20px; }
        .tg-card { background: linear-gradient(135deg, #0088cc, #00d4ff); margin-top: 20px; padding: 20px; border-radius: 15px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: none; justify-content: space-around; align-items: center; padding: 10px 0; border-top: 1px solid #222; z-index: 9999; }
        .nav-item { text-align: center; flex: 1; cursor: pointer; color: #888; font-size: 10px; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <nav class="navbar">
        <div id="menu-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <a href="#" class="logo">EARN LOGIC</a>
        <select id="lang-switch" style="width: auto; background: #222; padding: 5px;">
            <option value="en">English</option>
            <option value="bn">বাংলা</option>
        </select>
    </nav>

    <div id="sidebar" class="sidebar">
        <div style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--primary); font-weight:bold;">MENU</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; color:red;"></i>
        </div>
        <button class="menu-btn" onclick="showPage('dashboard')">Dashboard</button>
        <button class="menu-btn" onclick="showWithdraw()">Withdraw</button>
        <button class="menu-btn" onclick="showPage('profile-page')">Profile & Refer</button>
        <button class="menu-btn" onclick="window.open('https://t.me/earnlogic_official_bot')">Support (TG)</button>
        <button class="menu-btn" onclick="logout()" style="color:red;">Logout</button>
    </div>

    <div class="auth-container" id="auth-ui">
        <div class="card" id="signup-form">
            <h2>Sign Up</h2>
            <input type="text" id="s-user" placeholder="Username">
            <input type="email" id="s-email" placeholder="Email Address">
            <input type="password" id="s-pass" placeholder="Password">
            <select id="s-country">
                <option value="Bangladesh">Bangladesh</option>
                <option value="India">India</option>
            </select>
            <input type="text" id="s-refer" placeholder="Refer Code (Optional)">
            <button class="btn-main" onclick="register()">Register</button>
            <p onclick="toggleForm()" style="cursor:pointer; color:#555; margin-top:15px;">Login here</p>
        </div>

        <div class="card" id="login-form" style="display:none">
            <h2>Login</h2>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn-main" onclick="login()">Sign In</button>
            <p onclick="toggleForm()" style="cursor:pointer; color:#555; margin-top:15px;">New? Register</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="bal-card">
            <p>Main Balance</p>
            <h1 style="color:var(--primary); font-size:45px;"><i class="fas fa-coins"></i> <span id="coins">0</span></h1>
            <div style="color:var(--gold); margin-bottom:15px;">≈ ৳ <span id="tk">0.00</span></div>
            <button onclick="showWithdraw()" class="btn-main" style="width:auto; padding:10px 30px;">Withdraw Now</button>
        </div>

        <div class="tg-card" onclick="window.location.href='https://t.me/earnlogic_official_bot'">
            <div style="text-align: left;">
                <h3 style="margin: 0; font-size: 16px;">Earning via Telegram</h3>
                <p style="margin: 5px 0 0; font-size: 11px; opacity: 0.9;">Join our official bot for daily rewards!</p>
            </div>
            <i class="fab fa-telegram-plane" style="font-size: 25px;"></i>
        </div>
    </div>

    <div id="profile-page">
        <div class="card">
            <i class="fas fa-user-circle" style="font-size:60px; color:var(--primary); margin-bottom:10px;"></i>
            <h2 id="p-username">Loading...</h2>
            <p id="p-email" style="color:#777;">Loading...</p>
        </div>
        <div class="card">
            <h3>Refer & Earn</h3>
            <div class="copy-box" id="ref-code" onclick="copyText('ref-code')">...</div>
            <p style="font-size:10px; color:var(--gold);">Click to copy code</p>
        </div>
    </div>

    <div class="bottom-nav" id="bot-nav">
        <div class="nav-item active" onclick="showPage('dashboard')">
            <i class="fas fa-tasks"></i><div>Tasks</div>
        </div>
        <div class="nav-item" onclick="showWithdraw()">
            <i class="fas fa-wallet"></i><div>Withdraw</div>
        </div>
        <div class="nav-item" onclick="showPage('profile-page')">
            <i class="fas fa-user-friends"></i><div>Refer</div>
        </div>
        <div class="nav-item" onclick="window.open('https://t.me/earnlogicoffical')">
            <i class="fas fa-bullhorn"></i><div>Channel</div>
        </div>
    </div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAjOTYWJ8znUI-w10BYnDe2M9b4L4NkrqA",
        authDomain: "earn-logic.firebaseapp.com",
        projectId: "earn-logic",
        storageBucket: "earn-logic.firebasestorage.app",
        messagingSenderId: "254063437159",
        appId: "1:254063437159:web:a8e118c33c924bd48c3bc2"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
    function toggleForm() {
        document.getElementById("login-form").style.display = document.getElementById("login-form").style.display === "none" ? "block" : "none";
        document.getElementById("signup-form").style.display = document.getElementById("signup-form").style.display === "none" ? "block" : "none";
    }
    
    function showPage(id) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('profile-page').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(window.innerWidth < 1000 && document.getElementById("sidebar").classList.contains("active")) toggleSidebar();
    }

    function showWithdraw() {
        if(confirm("Withdrawal via Bot is safer. Redirect to @earnlogic_official_bot?")) {
            window.location.href = "https://t.me/earnlogic_official_bot";
        }
    }

    function copyText(id) {
        const txt = document.getElementById(id).innerText;
        navigator.clipboard.writeText(txt).then(() => alert("Copied: " + txt));
    }

    async function register() {
        const u = document.getElementById('s-user').value;
        const e = document.getElementById('s-email').value;
        const p = document.getElementById('s-pass').value;
        const c = document.getElementById('s-country').value;
        if(!u || !e || !p) return alert("Fill all fields!");
        try {
            const res = await auth.createUserWithEmailAndPassword(e, p);
            await db.collection('users').doc(res.user.uid).set({
                username: u, email: e, country: c, coins: 0, referCode: res.user.uid.substring(0,6).toUpperCase()
            });
            alert("Registered!");
        } catch(err) { alert(err.message); }
    }

    async function login() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        const nav = document.getElementById('bot-nav');
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('menu-trigger').style.display = 'block';
            nav.style.display = 'flex';
            
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                if(doc.exists) {
                    const d = doc.data();
                    document.getElementById('coins').innerText = d.coins || 0;
                    document.getElementById('tk').innerText = ((d.coins || 0) * 0.1).toFixed(2);
                    document.getElementById('p-username').innerText = d.username || "User";
                    document.getElementById('p-email').innerText = d.email || "";
                    document.getElementById('ref-code').innerText = d.referCode || "...";
                }
            });
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('profile-page').style.display = 'none';
            document.getElementById('menu-trigger').style.display = 'none';
            nav.style.display = 'none';
        }
    });

    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
        </html>
                                                                         </html>
