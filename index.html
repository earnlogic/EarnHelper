<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Logic - Advanced UI</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #121212; --text: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 70px; }

        /* Navbar & Sidebar */
        .navbar { background: #111; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .sidebar { position: fixed; left: -300px; top: 0; width: 300px; height: 100%; background: #0d0d0d; transition: 0.4s; z-index: 1001; overflow-y: auto; border-right: 1px solid #222; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .close-btn { font-size: 24px; cursor: pointer; color: var(--primary); }

        /* Dropdown UI */
        .menu-btn { width: 100%; text-align: left; padding: 15px 25px; background: none; border: none; color: white; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
        .dropdown-container { display: none; background: #151515; }
        .dropdown-container a { display: block; padding: 12px 40px; color: #aaa; text-decoration: none; font-size: 14px; border-bottom: 1px solid #222; }

        /* Form Styling */
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #222; max-width: 400px; margin: 20px auto; position: relative; }
        .input-group { position: relative; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        .eye-icon { position: absolute; right: 15px; top: 12px; cursor: pointer; color: #555; }
        .terms { font-size: 12px; color: #888; display: flex; align-items: center; gap: 8px; margin: 10px 0; }
        
        #other-country-div { display: none; margin-top: 10px; }
        .btn-main { width: 100%; padding: 13px; background: linear-gradient(45deg, #0072ff, #00d4ff); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div onclick="toggleSidebar()"><i class="fas fa-bars" style="font-size: 24px; color: var(--primary); cursor: pointer;"></i></div>
        <div style="font-weight:bold; color:var(--primary); font-size:20px;">EARN LOGIC</div>
        <div id="user-display" style="font-size:12px; color:#777;">Guest</div>
    </nav>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span style="color: var(--primary); font-weight: bold;">MENU</span>
            <div class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></div>
        </div>
        <button class="menu-btn" onclick="location.reload()">Home</button>
        
        <button class="menu-btn dash-toggle">Dashboard <i class="fas fa-chevron-down"></i></button>
        <div class="dropdown-container">
            <a href="#">My Tasks</a>
            <a href="#">Earnings</a>
            <a href="#">Withdraw</a>
        </div>

        <button class="menu-btn dash-toggle">Find Jobs <i class="fas fa-chevron-down"></i></button>
        <div class="dropdown-container">
            <a href="#">Micro Tasks</a>
            <a href="#">CPA Offers</a>
        </div>
        <button class="menu-btn" onclick="logout()" style="color:red">Logout</button>
    </div>

    <div class="card" id="auth-container">
        <div id="signup-form">
            <h2>Sign Up</h2>
            <div class="input-group"><input type="text" id="s-user" placeholder="Username"></div>
            <div class="input-group"><input type="email" id="s-email" placeholder="Email Address"></div>
            <div class="input-group">
                <input type="password" id="s-pass" placeholder="Password">
                <i class="fas fa-eye eye-icon" onclick="togglePass('s-pass')"></i>
            </div>
            <select id="s-country" onchange="checkCountry(this.value)">
                <option value="Bangladesh">Bangladesh</option>
                <option value="India">India</option>
                <option value="Other">Other...</option>
            </select>
            <div id="other-country-div"><input type="text" id="s-other-country" placeholder="Enter Country Name"></div>
            <div class="terms">
                <input type="checkbox" id="terms-check"> I agree to Terms & Conditions
            </div>
            <button class="btn-main" onclick="register()">Create Account</button>
            <p onclick="toggleForm()" style="cursor:pointer; font-size:14px; margin-top:15px; color:#555">Already a member? Login</p>
        </div>

        <div id="login-form" style="display:none">
            <h2>Login</h2>
            <div class="input-group"><input type="email" id="l-email" placeholder="Email"></div>
            <div class="input-group">
                <input type="password" id="l-pass" placeholder="Password">
                <i class="fas fa-eye eye-icon" onclick="togglePass('l-pass')"></i>
            </div>
            <button class="btn-main" onclick="login()">Login</button>
            <p onclick="toggleForm()" style="cursor:pointer; font-size:14px; margin-top:15px; color:#555">New here? Register</p>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAjOTYWJ8znUI-w10BYnDe2M9b4L4NkrqA",
            authDomain: "earn-logic.firebaseapp.com",
            projectId: "earn-logic",
            storageBucket: "earn-logic.firebasestorage.app",
            messagingSenderId: "254063437159",
            appId: "1:254063437159:web:a8e118c33c924bd48c3bc2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // UI Toggles
        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
        function toggleForm() {
            document.getElementById("login-form").style.display = document.getElementById("login-form").style.display === "none" ? "block" : "none";
            document.getElementById("signup-form").style.display = document.getElementById("signup-form").style.display === "none" ? "block" : "none";
        }
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }
        function checkCountry(val) {
            document.getElementById("other-country-div").style.display = val === "Other" ? "block" : "none";
        }

        // Dropdown Click Logic
        const toggles = document.getElementsByClassName("dash-toggle");
        for (let i = 0; i < toggles.length; i++) {
            toggles[i].addEventListener("click", function() {
                const container = this.nextElementSibling;
                container.style.display = container.style.display === "block" ? "none" : "block";
            });
        }

        // Auth Logic
        async function register() {
            const user = document.getElementById('s-user').value;
            const email = document.getElementById('s-email').value;
            const pass = document.getElementById('s-pass').value;
            const check = document.getElementById('terms-check').checked;
            if(!check) return alert("Please accept Terms and Conditions");
            
            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(res.user.uid).set({ username: user, coins: 0 });
                alert("Registration Successful!");
            } catch(e) { alert(e.message); }
        }

        async function login() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } catch(e) { alert(e.message); }
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                document.getElementById('auth-container').innerHTML = "<h2>Welcome to Dashboard</h2><p>You are logged in.</p>";
                document.getElementById('user-display').innerText = u.email;
            }
        });

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
