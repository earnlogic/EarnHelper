 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHelper PRO - All-in-One</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-green: #2ecc71; --dark-bg: #0b0b0b; --card-bg: #161616; --text-gray: #9ca3af; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .container { padding: 20px; max-width: 480px; margin: auto; }
        
        /* Auth Styles */
        .auth-card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #222; margin-top: 50px; }
        .input-group { position: relative; margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        .pass-toggle { position: absolute; right: 15px; top: 15px; color: var(--text-gray); cursor: pointer; }
        .btn { background: var(--neon-green); color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        
        /* Dashboard & Sections */
        .stat-card { background: #1a1a1a; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px; border: 1px solid #222; }
        .task-card { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }

        /* Floating AI Widget */
        #ai-widget { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background: var(--neon-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #ai-chat-window { display: none; position: fixed; bottom: 160px; right: 20px; width: 300px; height: 400px; background: #111; border-radius: 15px; border: 1px solid #333; flex-direction: column; z-index: 2001; }
        .ai-header { background: #222; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #ai-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; }
        .u-msg { align-self: flex-end; background: var(--neon-green); color: black; }
        .b-msg { align-self: flex-start; background: #222; border: 1px solid #333; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: var(--text-gray); text-align: center; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--neon-green); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="authSection" class="container">
    <div class="auth-card">
        <h2 id="authTitle" style="text-align: center;">Create Account</h2>
        <div id="regFields">
            <div class="input-group"><input type="text" id="regName" placeholder="Full Name"></div>
            <div class="input-group">
                <select id="regCountry" onchange="toggleOtherCountry(this.value)">
                    <option value="Bangladesh">Bangladesh</option>
                    <option value="India">India</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div id="otherCountryBox" style="display: none;" class="input-group">
                <input type="text" id="customCountry" placeholder="Enter Country Name">
            </div>
        </div>
        <div class="input-group"><input type="email" id="authEmail" placeholder="Email"></div>
        <div class="input-group">
            <input type="password" id="authPass" placeholder="Password">
            <i class="fa fa-eye pass-toggle" onclick="togglePassword()"></i>
        </div>
        <button class="btn" id="authBtn" onclick="handleAuth()">Sign Up</button>
        <p style="text-align: center; font-size: 14px; margin-top: 15px;">
            <span id="toggleText">Already have an account?</span> 
            <span onclick="switchAuth()" style="color: var(--neon-green); cursor: pointer; font-weight: bold;">Click Here</span>
        </p>
        <p id="forgotLink" style="text-align: center; font-size: 12px; display: none; cursor: pointer;" onclick="alert('Reset link sent!')">Forgot Password?</p>
    </div>
</div>

<div id="dashboard" style="display: none;">
    <div id="home-sec" class="container">
        <div class="stat-card">
            <p style="color: var(--text-gray);">Total Balance</p>
            <h1 style="color: var(--neon-green); font-size: 40px; margin: 10px 0;">৳ <span id="balance">0.00</span></h1>
            <div id="rankBadge" style="font-size: 12px; background: #333; padding: 4px 12px; border-radius: 20px;">BRONZE</div>
        </div>
        <h3>Active Tasks</h3>
        <div class="task-card">
            <div><b>Daily Check-in</b><p style="font-size: 12px; color: var(--text-gray); margin: 0;">Claim your 10 Taka</p></div>
            <div style="color: var(--neon-green); font-weight: bold;">+৳ 10</div>
        </div>
    </div>

    <div id="tasks-sec" class="container" style="display: none;">
        <h3>All Tasks</h3>
        <p>No new tasks available.</p>
    </div>

    <div id="withdraw-sec" class="container" style="display: none;">
        <h3>Withdraw</h3>
        <div class="stat-card">
            <input type="number" id="wAmount" placeholder="Enter Amount">
            <button class="btn" style="margin-top: 10px;" onclick="alert('Withdraw Request Sent!')">Request Withdraw</button>
        </div>
    </div>

    <div id="ai-widget" onclick="toggleAI()"><i class="fa fa-robot" style="color: black; font-size: 24px;"></i></div>
    <div id="ai-chat-window">
        <div class="ai-header"><span>AI Assistant</span><i class="fa fa-times" onclick="toggleAI()" style="cursor:pointer"></i></div>
        <div id="ai-messages"><div class="msg b-msg">Hello! How can I help you?</div></div>
        <div style="padding: 10px; display: flex; background: #000;">
            <input type="text" id="ai-input" style="flex:1; padding: 8px; border-radius: 5px; border: none; background: #222; color: white;" placeholder="Ask...">
            <button onclick="askAI()" style="background: var(--neon-green); border: none; padding: 8px; border-radius: 5px; margin-left: 5px;"><i class="fa fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showSec('home')"><i class="fa fa-home"></i>Home</div>
        <div class="nav-item" onclick="showSec('tasks')"><i class="fa fa-tasks"></i>Tasks</div>
        <div class="nav-item" onclick="showSec('withdraw')"><i class="fa fa-wallet"></i>Withdraw</div>
        <div class="nav-item" onclick="location.reload()"><i class="fa fa-sign-out-alt"></i>Exit</div>
    </div>
</div>

<script>
    const sURL = 'https://xserxssnjdshehrefhvr.supabase.co';
    const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZXJ4c3NuamRzaGVocmVmaHZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzY4MTgsImV4cCI6MjA4NzQxMjgxOH0.Dow2NjohUNLgpDluVKcV4TBACCpDyCa31BH-tdLYik8';
    const supabaseClient = supabase.createClient(sURL, sKey);

    let isLoginMode = false;

    function togglePassword() {
        const p = document.getElementById('authPass');
        p.type = p.type === "password" ? "text" : "password";
    }

    function toggleOtherCountry(val) {
        document.getElementById('otherCountryBox').style.display = val === "Other" ? "block" : "none";
    }

    function switchAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "Welcome Back" : "Create Account";
        document.getElementById('regFields').style.display = isLoginMode ? "none" : "block";
        document.getElementById('authBtn').innerText = isLoginMode ? "Log In" : "Sign Up";
        document.getElementById('forgotLink').style.display = isLoginMode ? "block" : "none";
    }

    async function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        if(isLoginMode) {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if(error) alert(error.message); else location.reload();
        } else {
            const name = document.getElementById('regName').value;
            let country = document.getElementById('regCountry').value;
            if(country === "Other") country = document.getElementById('customCountry').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
            if(error) return alert(error.message);
            await supabaseClient.from('profiles').insert([{ id: data.user.id, username: name, country: country }]);
            alert("Registration Success! Check email to confirm.");
        }
    }

    function showSec(id) {
        document.querySelectorAll('.container').forEach(s => s.style.display = 'none');
        document.getElementById(id + '-sec').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function toggleAI() {
        const win = document.getElementById('ai-chat-window');
        win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
    }

    async function askAI() {
        const input = document.getElementById('ai-input');
        const box = document.getElementById('ai-messages');
        if(!input.value) return;
        box.innerHTML += `<div class="msg u-msg">${input.value}</div>`;
        const text = input.value; input.value = "";
        const botId = "bot-" + Date.now();
        box.innerHTML += `<div class="msg b-msg" id="${botId}">...</div>`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyBduk7N7im9_Lm2FqRCsyPdS6ZHL665wY4`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const d = await res.json();
            document.getElementById(botId).innerText = d.candidates[0].content.parts[0].text;
        } catch(e) { document.getElementById(botId).innerText = "AI Service Error."; }
        box.scrollTop = box.scrollHeight;
    }

    window.onload = async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if(session) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
            if(data) {
                document.getElementById('balance').innerText = data.coins || "0.00";
                document.getElementById('rankBadge').innerText = data.coins > 5000 ? "GOLD" : "BRONZE";
           
            // এই ফাংশনটি মেনু পরিবর্তন করবে (WorkupJob-এর মতো)
function showSec(id) {
    // সব সেকশন আগে হাইড করো
    document.getElementById('home-sec').style.display = 'none';
    document.getElementById('tasks-sec').style.display = 'none';
    document.getElementById('withdraw-sec').style.display = 'none';

    // শুধু যেটিতে ক্লিক করা হয়েছে সেটি দেখাও
    document.getElementById(id + '-sec').style.display = 'block';

    // মেনু আইকনের কালার পরিবর্তন
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

            }
        }
    };
</script>
</body>
</html>
