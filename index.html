<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Logic - Official</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #121212; --text: #ffffff; --gold: #ffd700; --tg: #0088cc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-top: 70px; }
        .navbar { background: #111; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .logo { font-weight: bold; color: var(--primary); font-size: 22px; text-decoration: none; }
        #menu-trigger { display: none; cursor: pointer; font-size: 24px; color: var(--primary); }
        .sidebar { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: #0d0d0d; transition: 0.4s; z-index: 1001; overflow-y: auto; border-right: 1px solid #222; }
        .sidebar.active { left: 0; }
        .menu-btn { width: 100%; text-align: left; padding: 15px 25px; background: none; border: none; color: white; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
        .dropdown-container { display: none; background: #151515; }
        .dropdown-container a { display: block; padding: 12px 45px; color: #aaa; text-decoration: none; font-size: 13px; border-bottom: 1px solid #222; cursor: pointer; }
        .auth-container { max-width: 400px; margin: 40px auto; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 13px; background: linear-gradient(45deg, #0072ff, #00d4ff); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #dashboard, #profile-page { display: none; padding: 20px; text-align: center; max-width: 800px; margin: 0 auto; animation: fadeIn 0.5s; }
        .bal-card { background: linear-gradient(135deg, #111, #222); padding: 30px; border-radius: 25px; border: 1px solid #333; margin-bottom: 20px; }
        .footer { background: #0d0d0d; padding: 40px 20px; text-align: center; border-top: 1px solid #222; font-size: 13px; color: #777; margin-top: 50px; }
        .footer a { color: var(--primary); text-decoration: none; margin: 0 10px; cursor: pointer; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <nav class="navbar">
        <div id="menu-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <a href="#" class="logo">EARN LOGIC</a>
        <select id="lang-switch" style="width: auto; background: #222; padding: 5px;">
            <option value="en">English</option>
            <option value="bn">বাংলা</option>
        </select>
    </nav>

    <div id="sidebar" class="sidebar">
        <div style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--primary); font-weight:bold;">MENU</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer; color:red;"></i>
        </div>
        <button class="menu-btn" onclick="showPage('dashboard')">1. Dashboard</button>
        <button class="menu-btn" onclick="toggleDrop('drop-act')">2. My Activity <i class="fas fa-chevron-down"></i></button>
        <div id="drop-act" class="dropdown-container">
            <a onclick="showNotice()">Task History</a>
            <a onclick="showNotice()">Pending</a>
        </div>
        <button class="menu-btn" onclick="showNotice()">3. Find Jobs</button>
        <button class="menu-btn" onclick="showNotice()">4. Post a Job</button>
        <button class="menu-btn" onclick="toggleDrop('drop-wall')">5. Wallet <i class="fas fa-chevron-down"></i></button>
        <div id="drop-wall" class="dropdown-container">
            <a onclick="showWithdraw()">Withdraw</a>
            <a onclick="showNotice()">Transactions</a>
        </div>
        <button class="menu-btn" onclick="showPage('profile-page')">6. Profile & Refer</button>
        <button class="menu-btn" onclick="showNotice()">7. Leaderboard</button>
        <button class="menu-btn" onclick="showNotice()">8. Performance</button>
        <button class="menu-btn" onclick="window.open('https://t.me/YourBotLink')">9. Support (TG)</button>
        <button class="menu-btn" onclick="logout()" style="color:red; margin-top:20px;">10. Logout</button>
    </div>

    <div class="auth-container" id="auth-ui">
        <div class="card" id="signup-form">
            <h2>Sign Up</h2>
            <input type="text" id="s-user" placeholder="Username">
            <input type="email" id="s-email" placeholder="Email Address">
            <input type="password" id="s-pass" placeholder="Password">
            
            <select id="s-country" onchange="checkOtherCountry(this.value)">
                <option value="">Select Country</option>
                <option value="Bangladesh">Bangladesh</option>
                <option value="India">India</option>
                <option value="Other">Other</option>
            </select>
            <input type="text" id="s-other-country" placeholder="Enter Country Name" style="display:none;">

            <input type="text" id="s-refer" placeholder="Refer Code (Optional)">
            <button class="btn-main" onclick="register()">Register</button>
            <p onclick="toggleForm()" style="cursor:pointer; color:#555; margin-top:15px;">Login here</p>
        </div>

        <div class="card" id="login-form" style="display:none">
            <h2>Login</h2>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn-main" onclick="login()">Sign In</button>
            <p onclick="forgotPassword()" style="color:var(--primary); font-size:12px; cursor:pointer; margin-top:10px;">Forgot Password?</p>
            <p onclick="toggleForm()" style="cursor:pointer; color:#555; margin-top:15px;">New? Register</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="bal-card">
            <p>Main Balance</p>
            <h1 style="color:var(--primary); font-size:45px;"><i class="fas fa-coins"></i> <span id="coins">0</span></h1>
            <button onclick="showWithdraw()" class="btn-main" style="width:auto; padding:10px 30px;">Withdraw</button>
        </div>
    </div>

    <div id="profile-page">
        <div class="card">
            <h2 id="p-username">User</h2>
            <p id="p-email" style="color:#777;">email@example.com</p>
            <div style="margin-top:20px;">
                <p>Your Refer Code:</p>
                <div class="btn-main" id="ref-code" onclick="copyText('ref-code')" style="background:#222; border:1px dashed var(--primary);">...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <a onclick="showLegal('about')">About Us</a> | 
        <a onclick="showLegal('terms')">Terms</a> | 
        <a onclick="showLegal('privacy')">Privacy</a> | 
        <a onclick="showLegal('halal')">Halal Guidelines</a>
        <p>© 2026 Earn Logic</p>
    </div>

    <div id="legalModal" style="display:none;">
        <div class="modal-box">
            <h2 id="modalTitle" style="color:var(--primary);"></h2>
            <div id="modalContent" style="color:#ccc; margin:20px 0; text-align:left;"></div>
            <button class="btn-main" onclick="closeModal()">Close</button>
        </div>
    </div>

<script>
    // Firebase Config (Keep yours)
    const firebaseConfig = {
        apiKey: "AIzaSyAjOTYWJ8znUI-w10BYnDe2M9b4L4NkrqA",
        authDomain: "earn-logic.firebaseapp.com",
        projectId: "earn-logic",
        storageBucket: "earn-logic.firebasestorage.app",
        messagingSenderId: "254063437159",
        appId: "1:254063437159:web:a8e118c33c924bd48c3bc2"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Toggle Dropdown
    function toggleDrop(id) {
        const d = document.getElementById(id);
        d.style.display = d.style.display === "block" ? "none" : "block";
    }

    // Check Other Country
    function checkOtherCountry(val) {
        document.getElementById('s-other-country').style.display = val === "Other" ? "block" : "none";
    }

    // Forgot Password
    function forgotPassword() {
        const email = document.getElementById('l-email').value;
        if(!email) return alert("Please enter your email first!");
        auth.sendPasswordResetEmail(email).then(() => alert("Reset link sent to your email!")).catch(e => alert(e.message));
    }

    // Functions for UI
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); }
    function toggleForm() {
        document.getElementById("login-form").style.display = document.getElementById("login-form").style.display === "none" ? "block" : "none";
        document.getElementById("signup-form").style.display = document.getElementById("signup-form").style.display === "none" ? "block" : "none";
    }
    function showPage(id) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('profile-page').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        if(window.innerWidth < 1000) toggleSidebar();
    }
    function showNotice() { alert("Update coming soon! Please use Telegram Bot."); }
    function closeModal() { document.getElementById('legalModal').style.display = 'none'; }
    function showLegal(type) {
        const data = {
            about: "Earn Logic is a micro-task platform.",
            terms: "No VPN. One account only.",
            privacy: "We keep your data safe.",
            halal: "No gambling or prohibited ads."
        };
        document.getElementById('modalTitle').innerText = type.toUpperCase();
        document.getElementById('modalContent').innerText = data[type];
        document.getElementById('legalModal').style.display = 'block';
    }

    // Auth Logic
    async function register() {
        const u = document.getElementById('s-user').value;
        const e = document.getElementById('s-email').value;
        const p = document.getElementById('s-pass').value;
        let c = document.getElementById('s-country').value;
        if(c === "Other") c = document.getElementById('s-other-country').value;
        
        if(!u || !e || !p || !c) return alert("All fields required!");
        try {
            const res = await auth.createUserWithEmailAndPassword(e, p);
            await db.collection('users').doc(res.user.uid).set({
                username: u, email: e, country: c, coins: 0,
                referCode: res.user.uid.substring(0,6).toUpperCase()
            });
            alert("Success!");
        } catch(err) { alert(err.message); }
    }

    async function login() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('menu-trigger').style.display = 'block';
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                const d = doc.data();
                document.getElementById('coins').innerText = d.coins || 0;
                document.getElementById('p-username').innerText = d.username;
                document.getElementById('p-email').innerText = d.email;
                document.getElementById('ref-code').innerText = d.referCode;
            });
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('menu-trigger').style.display = 'none';
        }
    });

    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
    </html>
