<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHelper PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --bg: #0b0b0b; --card: #161616; --text: #9ca3af; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Sidebar & Header */
        .header { position: fixed; top: 0; width: 100%; background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #111; z-index: 2000; transition: 0.3s; border-right: 1px solid #222; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .m-item { padding: 15px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }

        /* Floating AI (Top Right) */
        #ai-btn { position: fixed; top: 75px; right: 20px; width: 50px; height: 50px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; color: black; box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); cursor: pointer; }
        
        /* Auth Section */
        .container { padding: 80px 20px 20px; max-width: 480px; margin: auto; }
        input, select { width: 100%; padding: 14px; background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 12px; outline: none; box-sizing: border-box; }
        .btn { background: var(--primary); color: black; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Dashboard Items */
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; text-align: center; }
        #ai-box { display: none; position: fixed; top: 135px; right: 20px; width: 280px; height: 350px; background: #000; border: 1px solid #333; border-radius: 12px; flex-direction: column; z-index: 1001; }
    </style>
</head>
<body>

<div id="authSection" class="container" style="padding-top: 40px;">
    <div class="card">
        <h2 id="atitle">Create Account</h2>
        <div id="regFields">
            <input type="text" id="regName" placeholder="Full Name">
            <select id="regCountry" onchange="document.getElementById('oc').style.display=(this.value=='Other'?'block':'none')">
                <option value="Bangladesh">Bangladesh</option><option value="Other">Other</option>
            </select>
            <input type="text" id="oc" placeholder="Country Name" style="display:none">
        </div>
        <input type="email" id="email" placeholder="Email">
        <div style="position:relative">
            <input type="password" id="pass" placeholder="Password">
            <i class="fa fa-eye" style="position:absolute; right:15px; top:15px; color:#666;" onclick="tp()"></i>
        </div>
        <button class="btn" onclick="auth()">Submit</button>
        <p style="font-size:12px; margin-top:15px; cursor:pointer;" onclick="sw()">Switch Login/Register</p>
    </div>
</div>

<div id="dashboard" style="display:none">
    <div class="header">
        <i class="fa fa-bars" onclick="tm()"></i>
        <b>EARNHELPER PRO</b>
        <i class="fa fa-bell"></i>
    </div>

    <div class="sidebar" id="sb">
        <div style="padding:20px; text-align:right" onclick="tm()"><i class="fa fa-times"></i></div>
        <div class="m-item" onclick="sec('h')"><i class="fa fa-home"></i> Dashboard</div>
        <div class="m-item"><i class="fa fa-key"></i> Change Password</div>
        <div class="m-item"><i class="fa fa-plus-circle"></i> Create Task</div>
        <div class="m-item"><i class="fa fa-wallet"></i> Withdraw Story</div>
        <div class="m-item" onclick="location.reload()"><i class="fa fa-power-off"></i> Logout</div>
    </div>

    <div id="ai-btn" onclick="tai()"><i class="fa fa-robot"></i></div>

    <div class="container">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:10px;">
            <span id="uid">ID: #0000</span>
            <span>Language: BN/EN</span>
        </div>
        <div class="card">
            <small style="color:#888">Main Balance</small>
            <h1 style="color:var(--primary); margin:5px 0;">৳ <span id="bal">0.00</span></h1>
            <button class="btn" style="padding:8px; font-size:12px;">Leaderboard</button>
        </div>
        <div id="jobs"><h3>Available Tasks</h3><p>Loading...</p></div>
    </div>

    <div id="ai-box">
        <div style="background:#222; padding:10px; display:flex; justify-content:space-between;">
            <span>AI Assistant</span><i class="fa fa-times" onclick="tai()"></i>
        </div>
        <div id="msgs" style="flex:1; overflow-y:auto; padding:10px; font-size:13px;"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="ait" style="margin:0; padding:8px;">
            <button onclick="askAI()" class="btn" style="width:auto; padding:8px 15px;">Send</button>
        </div>
    </div>
</div>

<script>
    const sURL = 'https://xserxssnjdshehrefhvr.supabase.co';
    const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZXJ4c3NuamRzaGVocmVmaHZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzY4MTgsImV4cCI6MjA4NzQxMjgxOH0.Dow2NjohUNLgpDluVKcV4TBACCpDyCa31BH-tdLYik8';
    const sb = supabase.createClient(sURL, sKey);
    let isl = false;

    function tm() { document.getElementById('sb').classList.toggle('active'); }
    function tai() { const b = document.getElementById('ai-box'); b.style.display = b.style.display==='flex'?'none':'flex'; }
    function sw() { isl=!isl; document.getElementById('atitle').innerText=isl?"Login":"Create Account"; document.getElementById('regFields').style.display=isl?"none":"block"; }
    function tp() { const p=document.getElementById('pass'); p.type=p.type==='password'?'text':'password'; }

    async function auth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(isl) {
            const {error} = await sb.auth.signInWithPassword({email:e, password:p});
            if(error) alert(error.message); else location.reload();
        } else {
            const n = document.getElementById('regName').value;
            const {data, error} = await sb.auth.signUp({email:e, password:p});
            if(error) return alert(error.message);
            await sb.from('profiles').insert([{id:data.user.id, username:n, coins:0}]);
            alert("Success! Check Email.");
        }
    }

    async function askAI() {
        const i=document.getElementById('ait'); const m=document.getElementById('msgs');
        const txt=i.value; i.value=""; m.innerHTML+=`<div><b>You:</b> ${txt}</div>`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyBduk7N7im9_Lm2FqRCsyPdS6ZHL665wY4`, {
                method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({contents:[{parts:[{text:txt}]}]})
            });
            const d=await res.json();
            m.innerHTML+=`<div style="color:var(--primary)"><b>AI:</b> ${d.candidates[0].content.parts[0].text}</div>`;
        } catch(e) { m.innerHTML+=`<div>Error</div>`; }
    }

    window.onload = async () => {
        const {data:{session}} = await sb.auth.getSession();
        if(session) {
            document.getElementById('authSection').style.display='none';
            document.getElementById('dashboard').style.display='block';
            const {data:p} = await sb.from('profiles').select('*').eq('id', session.user.id).single();
            if(p) { document.getElementById('bal').innerText=p.coins.toFixed(2); document.getElementById('uid').innerText="ID: #"+p.id.substring(0,5); }
            const {data:t} = await sb.from('tasks').select('*');
            if(t) {
                let h=''; t.forEach(j => h+=`<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px;"><span>${j.title}</span><b>৳ ${j.reward}</b></div>`);
                document.getElementById('jobs').innerHTML = h || 'No tasks found.';
            }
        }
    }
</script>
</body>
                                                       </html>
