<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHelper PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --bg: #0b0b0b; --card: #161616; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        .container { padding: 20px; max-width: 480px; margin: auto; }
        
        /* Top Header & Menu */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--primary); }
        .side-menu { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #111; z-index: 2000; transition: 0.3s; padding-top: 60px; border-right: 1px solid #222; }
        .menu-item { padding: 15px 25px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: #1a1a1a; color: var(--primary); }
        
        /* Auth & Cards */
        .auth-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #222; margin-top: 40px; }
        input, select { width: 100%; padding: 14px; background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .btn { background: var(--primary); color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; margin-bottom: 15px; }
        
        /* Floating AI */
        #ai-widget { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="sideMenu" class="side-menu">
    <div style="position: absolute; top: 15px; right: 15px; font-size: 20px;" onclick="toggleMenu()"><i class="fa fa-times"></i></div>
    <div class="menu-item" onclick="showSec('home')"><i class="fa fa-home"></i> Home</div>
    <div class="menu-item" onclick="showSec('tasks')"><i class="fa fa-briefcase"></i> Find Jobs</div>
    <div class="menu-item" onclick="showSec('withdraw')"><i class="fa fa-wallet"></i> Wallet</div>
    <div class="menu-item" onclick="location.reload()"><i class="fa fa-sign-out-alt"></i> Logout</div>
</div>

<div id="authSection" class="container">
    <div class="auth-card">
        <h2 id="authTitle" style="text-align: center;">Create Account</h2>
        <div id="regFields">
            <input type="text" id="regName" placeholder="Full Name">
            <select id="regCountry" onchange="document.getElementById('otherC').style.display=(this.value=='Other'?'block':'none')">
                <option value="Bangladesh">Bangladesh</option><option value="Other">Other</option>
            </select>
            <input type="text" id="otherC" placeholder="Country Name" style="display:none">
        </div>
        <input type="email" id="authEmail" placeholder="Email">
        <div style="position:relative">
            <input type="password" id="authPass" placeholder="Password">
            <i class="fa fa-eye" style="position:absolute; right:15px; top:15px; color:#666;" onclick="tPass()"></i>
        </div>
        <button class="btn" onclick="handleAuth()">Submit</button>
        <p style="text-align:center; font-size:14px;" onclick="switchAuth()">Switch Login/Signup</p>
    </div>
</div>

<div id="dashboard" style="display: none;">
    <div class="header">
        <div class="menu-icon" onclick="toggleMenu()"><i class="fa fa-bars"></i></div>
        <div style="font-weight: bold;">EarnHelper PRO</div>
        <div id="userRank" style="font-size: 10px; background: #333; padding: 4px 10px; border-radius: 10px;">BRONZE</div>
    </div>

    <div id="home-sec" class="container">
        <div class="stat-card">
            <p style="color:#999; margin:0;">Total Balance</p>
            <h2 style="color:var(--primary); margin:10px 0;">৳ <span id="balance">0.00</span></h2>
        </div>
        <h3>Available Tasks</h3>
        <div class="stat-card" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="text-align:left;"><b>YT Subscribe</b><br><small>Earn ৳ 2.00</small></div>
            <button class="btn" style="width:auto; padding:5px 15px;">Do It</button>
        </div>
    </div>

    <div id="tasks-sec" class="container" style="display:none;"><h3>Job List</h3><p>Loading jobs...</p></div>
    <div id="withdraw-sec" class="container" style="display:none;"><h3>Withdraw</h3><input type="number" placeholder="Amount"><button class="btn">Withdraw</button></div>

    <div id="ai-widget" onclick="alert('AI Coming Soon')"><i class="fa fa-robot" style="color:black; font-size:24px;"></i></div>
</div>

<script>
    const sURL = 'https://xserxssnjdshehrefhvr.supabase.co';
    const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZXJ4c3NuamRzaGVocmVmaHZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MzY4MTgsImV4cCI6MjA4NzQxMjgxOH0.Dow2NjohUNLgpDluVKcV4TBACCpDyCa31BH-tdLYik8';
    const supabaseClient = supabase.createClient(sURL, sKey);
    let isLogin = false;

    function toggleMenu() { 
        const m = document.getElementById('sideMenu');
        m.style.left = m.style.left === '0px' ? '-250px' : '0px';
    }

    function showSec(id) {
        ['home-sec', 'tasks-sec', 'withdraw-sec'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(id + '-sec').style.display = 'block';
        toggleMenu();
    }

    function tPass() { const p = document.getElementById('authPass'); p.type = p.type === 'password' ? 'text' : 'password'; }
    
    function switchAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Login" : "Sign Up";
        document.getElementById('regFields').style.display = isLogin ? "none" : "block";
    }

    async function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        if(isLogin) {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if(error) alert(error.message); else location.reload();
        } else {
            const name = document.getElementById('regName').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
            if(error) return alert(error.message);
            await supabaseClient.from('profiles').insert([{ id: data.user.id, username: name, coins: 0 }]);
            alert("Success! Check Email.");
        }
    }

    window.onload = async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if(session) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
            if(data) document.getElementById('balance').innerText = data.coins.toFixed(2);
        }
    };
</script>
</body>
</html>
