<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Logic - গোপন অ্যাডমিন প্যানেল</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: white; padding: 20px; }
        .admin-container { max-width: 800px; margin: auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .tab-btn { padding: 10px 20px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .card { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid #00d4ff; text-align: left; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-ban { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: white; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="admin-container" id="login-sec">
    <h2>গোপন অ্যাডমিন লগইন</h2>
    <input type="password" id="pass" placeholder="গোপন কোডটি দিন">
    <button class="tab-btn" onclick="login()">প্রবেশ করুন</button>
</div>

<div id="main-admin" style="display:none;">
    <h1>অ্যাডমিন ড্যাশবোর্ড</h1>
    <button class="tab-btn" onclick="showWithdraws()">পেন্ডিং উইথড্র</button>
    <button class="tab-btn" onclick="showUsers()" style="background:#ffc107; color:black;">ইউজার ম্যানেজমেন্ট</button>
<button class="tab-btn" onclick="showSettings()" style="background:#007bff; color:white;">সেটিংস</button>
    <div id="content-area">
        <!-- এখানে ডাটা লোড হবে -->
    </div>
</div>

<script>
    // তোমার ফায়ারবেস কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyAjOTYWJ8znUI-w10BYnDe2M9b4L4NkrqA",
        authDomain: "earn-logic.firebaseapp.com",
        projectId: "earn-logic",
        storageBucket: "earn-logic.firebasestorage.app",
        messagingSenderId: "254063437159",
        appId: "1:254063437159:web:a8e118c33c924bd48c3bc2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const auth = firebase.auth();

    async function login() {
        const passInput = document.getElementById('pass').value;
        if(passInput === "7788") {
            try {
                // নিচের ইমেইল এবং পাসওয়ার্ডের জায়গায় তোমার নিজেরটা দাও
                await auth.signInWithEmailAndPassword("mdjubayerrahman638@gmail.com", "ahasaN00*#");
                
                document.getElementById('login-sec').style.display = 'none';
                document.getElementById('main-admin').style.display = 'block';
                showWithdraws();
                alert("অ্যাডমিন ভেরিফাইড!");
            } catch (error) {
                alert("লগইন ব্যর্থ: " + error.message);
            }
        } else { 
            alert("ভুল গোপন কোড!"); 
        }
    }
    // উইথড্র লিস্ট দেখানো
    async function showWithdraws() {
        const area = document.getElementById('content-area');
        area.innerHTML = "লোডিং...";
        const snapshot = await db.collection('withdrawals').where('status','==','Pending').get();
        let html = "<h3>পেন্ডিং পেমেন্ট লিস্ট:</h3>";
        
        snapshot.forEach(doc => {
            const d = doc.data();
            html += `
                <div class="card">
                    <p><b>নাম:</b> ${d.username} | <b>কয়েন:</b> ${d.amount}</p>
                    <p><b>মেথড:</b> ${d.method} | <b>নম্বর:</b> ${d.account || d.number}</p>
                    <button class="btn-pay" onclick="confirmPayment('${doc.id}')">পেমেন্ট সাকসেস</button>
                </div>`;
        });
        area.innerHTML = html;
    }

    async function confirmPayment(id) {
        if(!confirm("আপনি কি নিশ্চিত যে পেমেন্ট সফল হয়েছে? এটি ইউজারের ব্যালেন্স থেকে অটোমেটিক কয়েন কেটে নেবে।")) return;
        
        try {
            // ১. উইথড্র রিকোয়েস্টের ডাটা আনা
            const withdrawDoc = await db.collection('withdrawals').doc(id).get();
            const withdrawData = withdrawDoc.data();
            const userUid = withdrawData.uid; 
            const amountToCut = parseInt(withdrawData.amount);

            if(!userUid) { alert("ইউজার আইডি পাওয়া যায়নি!"); return; }

            // ২. ট্রানজ্যাকশনের মাধ্যমে ব্যালেন্স কাটা এবং স্ট্যাটাস আপডেট করা
            const userRef = db.collection('users').doc(userUid);
            await db.runTransaction(async (transaction) => {
                const userDoc = await transaction.get(userRef);
                if (!userDoc.exists) throw "ইউজার ডাটাবেসে নেই!";
                
                let currentCoins = userDoc.data().coins || 0;
                if(currentCoins < amountToCut) throw "ইউজারের পর্যাপ্ত ব্যালেন্স নেই!";

                let newBalance = currentCoins - amountToCut;
                
                // ব্যালেন্স আপডেট
                transaction.update(userRef, { coins: newBalance });
                // উইথড্র স্ট্যাটাস আপডেট
                transaction.update(db.collection('withdrawals').doc(id), { status: 'Success' });
            });

            alert("সফল হয়েছে! ইউজারের অ্যাকাউন্ট থেকে " + amountToCut + " কয়েন কেটে নেওয়া হয়েছে।");
            showWithdraws();
        } catch (error) {
            alert("ত্রুটি: " + error);
        }
                                      }

    // ইউজার লিস্ট দেখানো (ব্যান করার জন্য)
    async function showUsers() {
        const area = document.getElementById('content-area');
        area.innerHTML = "ইউজার লোড হচ্ছে...";
        const snapshot = await db.collection('users').limit(20).get();
        let html = "<h3>ইউজার লিস্ট (ব্যান/কন্ট্রোল):</h3>";

        snapshot.forEach(doc => {
            const d = doc.data();
            html += `
                <div class="card">
                    <p><b>ইউজার:</b> ${d.user || d.username || 'N/A'} | <b>ব্যালেন্স:</b> ${d.coins || 0}</p>
                    <button class="btn-ban" onclick="banUser('${doc.id}')">ব্যান করুন</button>
                </div>`;
        });
        area.innerHTML = html;
    }

    async function banUser(id) {
        if(confirm("আপনি কি নিশ্চিত এই ইউজারকে ব্যান করতে চান?")) {
            await db.collection('users').doc(id).update({ status: 'Banned' });
            alert("ইউজার ব্যান করা হয়েছে!");
            showUsers();
        }
    }
    // ২জন মডারেটরের আইডি সহ ডায়নামিক সেটিংস (Update System)
async function showSettings() {
    const area = document.getElementById('content-area');
    area.innerHTML = "সেটিংস লোড হচ্ছে...";
    
    const doc = await db.collection('settings').doc('app_control').get();
    const s = doc.exists ? doc.data() : { 
        rate: 10, 
        notice: "সাইটে স্বাগতম!", 
        min_withdraw: 50,
        support_id_1: "@Akash10231",
        support_id_2: "@CEOofEarnLogic"
    };

    area.innerHTML = `
        <div class="card" style="border-left: 5px solid #00d4ff;">
            <h3>🛠 অ্যাডমিন মাস্টার কন্ট্রোল</h3>
            
            <p>💰 প্রতি ১০০ কয়েনে রেট (টাকা):</p>
            <input type="number" id="new-rate" value="${s.rate}">
            
            <p>💳 সর্বনিম্ন উইথড্র (কয়েন):</p>
            <input type="number" id="min-withdraw" value="${s.min_withdraw || 50}">
            
            <p>📢 হোম পেজ নোটিশ:</p>
            <input type="text" id="new-notice" value="${s.notice}">

            <p>👤 সাপোর্ট আইডি ১ (Telegram):</p>
            <input type="text" id="sup-1" value="${s.support_id_1 || ''}">

            <p>👤 সাপোর্ট আইডি ২ (Telegram):</p>
            <input type="text" id="sup-2" value="${s.support_id_2 || ''}">
            
            <br><br>
            <button class="tab-btn" style="width:100%; background:#00d4ff; color:black;" onclick="saveSettings()">সব সেটিংস সেভ করুন</button>
        </div>
    `;
}

// Update সিস্টেম ব্যবহার করে সেভ করা
async function saveSettings() {
    const r = document.getElementById('new-rate').value;
    const n = document.getElementById('new-notice').value;
    const minW = document.getElementById('min-withdraw').value;
    const s1 = document.getElementById('sup-1').value;
    const s2 = document.getElementById('sup-2').value;

    try {
        await db.collection('settings').doc('app_control').update({
            rate: parseInt(r),
            notice: n,
            min_withdraw: parseInt(minW),
            support_id_1: s1,
            support_id_2: s2
        });
        alert("সাপোর্ট আইডি এবং সেটিংস আপডেট হয়েছে!");
    } catch (e) {
        // যদি আগে কোনো ডাটা না থাকে তবে নতুন করে সেট করবে
        await db.collection('settings').doc('app_control').set({
            rate: parseInt(r),
            notice: n,
            min_withdraw: parseInt(minW),
            support_id_1: s1,
            support_id_2: s2
        });
        alert("সেটিংস সফলভাবে তৈরি করা হয়েছে!");
    }
    }
</script>

</body>
  </html>
