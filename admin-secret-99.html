<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Logic - গোপন অ্যাডমিন প্যানেল</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: white; padding: 20px; }
        .admin-container { max-width: 800px; margin: auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .tab-btn { padding: 10px 20px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .card { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid #00d4ff; text-align: left; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-ban { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: white; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="admin-container" id="login-sec">
    <h2>গোপন অ্যাডমিন লগইন</h2>
    <input type="password" id="pass" placeholder="গোপন কোডটি দিন">
    <button class="tab-btn" onclick="login()">প্রবেশ করুন</button>
</div>

<div id="main-admin" style="display:none;">
    <h1>অ্যাডমিন ড্যাশবোর্ড</h1>
    <button class="tab-btn" onclick="showWithdraws()">পেন্ডিং উইথড্র</button>
    <button class="tab-btn" onclick="showUsers()" style="background:#ffc107; color:black;">ইউজার ম্যানেজমেন্ট</button>
<button class="tab-btn" onclick="showSettings()" style="background:#007bff; color:white;">সেটিংস</button>
    <div id="content-area">
        <!-- এখানে ডাটা লোড হবে -->
    </div>
</div>

<script>
    // তোমার ফায়ারবেস কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyAjOTYWJ8znUI-w10BYnDe2M9b4L4NkrqA",
        authDomain: "earn-logic.firebaseapp.com",
        projectId: "earn-logic",
        storageBucket: "earn-logic.firebasestorage.app",
        messagingSenderId: "254063437159",
        appId: "1:254063437159:web:a8e118c33c924bd48c3bc2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        if(document.getElementById('pass').value === "7788") {
            document.getElementById('login-sec').style.display = 'none';
            document.getElementById('main-admin').style.display = 'block';
            showWithdraws();
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    // উইথড্র লিস্ট দেখানো
    async function showWithdraws() {
        const area = document.getElementById('content-area');
        area.innerHTML = "লোডিং...";
        const snapshot = await db.collection('withdrawals').where('status','==','Pending').get();
        let html = "<h3>পেন্ডিং পেমেন্ট লিস্ট:</h3>";
        
        snapshot.forEach(doc => {
            const d = doc.data();
            html += `
                <div class="card">
                    <p><b>নাম:</b> ${d.username} | <b>কয়েন:</b> ${d.amount}</p>
                    <p><b>মেথড:</b> ${d.method} | <b>নম্বর:</b> ${d.account || d.number}</p>
                    <button class="btn-pay" onclick="confirmPayment('${doc.id}')">পেমেন্ট সাকসেস</button>
                </div>`;
        });
        area.innerHTML = html;
    }

    async function confirmPayment(id) {
        await db.collection('withdrawals').doc(id).update({ status: 'Success' });
        alert("পেমেন্ট কনফার্ম হয়েছে!");
        showWithdraws();
    }

    // ইউজার লিস্ট দেখানো (ব্যান করার জন্য)
    async function showUsers() {
        const area = document.getElementById('content-area');
        area.innerHTML = "ইউজার লোড হচ্ছে...";
        const snapshot = await db.collection('users').limit(20).get();
        let html = "<h3>ইউজার লিস্ট (ব্যান/কন্ট্রোল):</h3>";

        snapshot.forEach(doc => {
            const d = doc.data();
            html += `
                <div class="card">
                    <p><b>ইউজার:</b> ${d.username} | <b>ব্যালেন্স:</b> ${d.coins}</p>
                    <button class="btn-ban" onclick="banUser('${doc.id}')">ব্যান করুন</button>
                </div>`;
        });
        area.innerHTML = html;
    }

    async function banUser(id) {
        if(confirm("আপনি কি নিশ্চিত এই ইউজারকে ব্যান করতে চান?")) {
            await db.collection('users').doc(id).update({ status: 'Banned' });
            alert("ইউজার ব্যান করা হয়েছে!");
            showUsers();
        }
    }
    // ওয়েবসাইট সেটিংস কন্ট্রোল করা
async function showSettings() {
    const area = document.getElementById('content-area');
    area.innerHTML = "সেটিংস লোড হচ্ছে...";
    const doc = await db.collection('settings').doc('app_control').get();
    const s = doc.exists ? doc.data() : { rate: 10, notice: "সাইটে স্বাগতম!" };

    area.innerHTML = `
        <div class="card">
            <h3>ওয়েবসাইট কন্ট্রোল</h3>
            <p>প্রতি ১০০ কয়েনে কত টাকা? (Rate):</p>
            <input type="number" id="new-rate" value="${s.rate}">
            <p>হোম পেজ নোটিশ:</p>
            <input type="text" id="new-notice" value="${s.notice}">
            <br><br>
            <button class="tab-btn" onclick="saveSettings()">Save Changes</button>
        </div>
    `;
}

async function saveSettings() {
    const r = document.getElementById('new-rate').value;
    const n = document.getElementById('new-notice').value;
    await db.collection('settings').doc('app_control').set({
        rate: parseInt(r),
        notice: n
    });
    alert("সেটিংস আপডেট হয়েছে!");
}
</script>

</body>
  </html>
